# Flyway Configuration - Proyecto Gathel

# URL de conexion JDBC para Microsoft SQL Server
flyway.url=jdbc:sqlserver://localhost:1433;databaseName=GathelDB;encrypt=true;trustServerCertificate=true

# Credenciales de autenticacion de SQL Server
flyway.user=sa
flyway.password=contraseña

# Ubicacion de los scripts de migracion
flyway.locations=filesystem:sql

# Esquema por defecto
flyway.defaultSchema=dbo

# Validar hashes al migrar para detectar cambios no autorizados en scripts ya aplicados
flyway.validateOnMigrate=true

# No permitir migraciones fuera de orden
flyway.outOfOrder=false

# Codificacion de los scripts SQL
flyway.encoding=UTF-8
